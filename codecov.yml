coverage:
  range: "30...100"
  
status:
  project:
    default:
      threshold: 1

# The Swing UI is explicitly excluded from code coverage reports (see
# docs/developer-guide.md). Main.java is the Swing entry point.
ignore:
  - "src/main/java/org/edumips64/ui/swing/**"
  - "src/main/java/org/edumips64/Main.java"

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: webui
      paths:
        - src/webapp/
      carryforward: true
