name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release with tag and artifacts'
        required: true
        type: boolean
        default: true

# Only allow one release workflow to run at a time.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. Read the version from gradle.properties, and optionally validate it
  #    against the latest existing tag when running a full release.
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.read_version.outputs.version }}
      is_release: ${{ steps.set_mode.outputs.is_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # full history so we can see tags

      - name: Read version from gradle.properties
        id: read_version
        uses: christian-draeger/read-properties@1.1.1
        with:
          path: 'gradle.properties'
          properties: 'version'

      - name: Determine workflow mode
        id: set_mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.create_release }}" == "true" ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version for release
        if: steps.set_mode.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.read_version.outputs.version }}"
          TAG="v${VERSION}"

          echo "Current version : ${VERSION}"
          echo "Expected tag    : ${TAG}"

          # Check that the tag does not already exist
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists. Please bump the version in gradle.properties before releasing."
            exit 1
          fi

          # Fetch the latest semver tag and compare
          LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          if [ -n "${LATEST_TAG}" ]; then
            LATEST_VERSION="${LATEST_TAG#v}"
            echo "Latest released version: ${LATEST_VERSION}"

            # Use sort -V to verify the new version is strictly greater.
            # This project uses simple X.Y.Z versioning (no pre-release suffixes).
            HIGHEST=$(printf '%s\n%s' "${LATEST_VERSION}" "${VERSION}" | sort -V | tail -n1)
            if [ "${HIGHEST}" = "${LATEST_VERSION}" ]; then
              echo "::error::Version ${VERSION} is not greater than the latest release ${LATEST_VERSION}. Please bump the version in gradle.properties."
              exit 1
            fi
            echo "✅ Version ${VERSION} is greater than ${LATEST_VERSION}"
          else
            echo "No previous release tags found – this will be the first release."
          fi

  # ---------------------------------------------------------------------------
  # 2. Build the desktop JAR and PDF manuals.
  # ---------------------------------------------------------------------------
  build-desktop:
    name: Build desktop application and docs
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile and run tests
        run: ./gradlew check

      - name: Build all docs
        run: ./gradlew allDocs

      - name: Build JAR
        run: ./gradlew jar

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: JAR
          path: ./build/libs/edumips64-${{ needs.prepare.outputs.version }}.jar

      - name: Upload English Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: English manual (PDF)
          path: ./build/docs/en/pdf/EduMIPS64.pdf

      - name: Upload Italian Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: Italian manual (PDF)
          path: ./build/docs/it/pdf/EduMIPS64.pdf

  # ---------------------------------------------------------------------------
  # 3. Build the Windows MSI installer.
  # ---------------------------------------------------------------------------
  build-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: [prepare, build-desktop]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Checkout Wix repository
        uses: actions/checkout@v6
        with:
          repository: fbarresi/wix
          path: wix

      - name: Download JAR
        uses: actions/download-artifact@v8.0.1
        with:
          name: JAR
          path: build/libs

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'microsoft'

      - name: Build MSI
        run: ./gradlew MSI

      - name: Upload MSI
        uses: actions/upload-artifact@v7
        with:
          name: MSI
          path: EduMIPS64-*.msi

  # ---------------------------------------------------------------------------
  # 4. Build the web application (needed for Electron).
  # ---------------------------------------------------------------------------
  build-web:
    name: Build web application
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Node.JS
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install

      - name: Cache GWT unit cache
        uses: actions/cache@v5
        with:
          path: gwt-unitCache
          key: gwt-${{ hashFiles('src/main/java/**/*.java') }}
          restore-keys: |
            gwt-

      - name: Build JS Worker (Java → JS), including HTML docs
        run: ./gradlew webapp

      - name: Upload web application artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: build/gwt/war/edumips64

  # ---------------------------------------------------------------------------
  # 5. Build Electron applications for Linux, macOS and Windows.
  # ---------------------------------------------------------------------------
  build-electron:
    name: Build Electron (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: [prepare, build-web]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact-name: Electron Linux x64
            artifact-path: electron/dist/WebEduMips64-linux-x64
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact-name: Electron macOS ARM64
            artifact-path: electron/dist/WebEduMips64-darwin-arm64
          - os: windows-latest
            platform: win32
            arch: x64
            artifact-name: Electron Windows x64
            artifact-path: electron/dist/WebEduMips64-win32-x64
    steps:
      - uses: actions/checkout@v6

      - name: Download web application artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: web
          path: build/gwt/war/edumips64

      - name: Set up Node.JS
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install

      - name: Build Electron application for ${{ matrix.platform }}-${{ matrix.arch }}
        working-directory: electron
        shell: bash
        run: |
          rm -rf ./dist/WebEduMips64-${{ matrix.platform }}-${{ matrix.arch }}

          # Copy index.js to root directory (required by electron-packager)
          cp index.js ..

          # Build the Electron app
          if [ "${{ matrix.platform }}" = "linux" ]; then
            npx electron-packager ../ WebEduMips64 --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --out dist
          else
            npx electron-packager ../ WebEduMips64 --asar --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --out dist
          fi

          rm ../index.js

      - name: Upload ${{ matrix.artifact-name }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  # ---------------------------------------------------------------------------
  # 6. Create a GitHub release (only on manual dispatch with create_release).
  #    Tags the commit and uploads all artifacts.
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub release
    if: needs.prepare.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    needs: [prepare, build-desktop, build-msi, build-electron]
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      # Download every artifact into its own subdirectory.
      - uses: actions/download-artifact@v8.0.1
        with:
          path: release-artifacts

      # Prepare a flat directory with well-named files for the release.
      - name: Stage release assets
        run: |
          mkdir -p staged

          # JAR
          cp release-artifacts/JAR/edumips64-${VERSION}.jar staged/

          # PDF manuals
          cp "release-artifacts/English manual (PDF)/EduMIPS64.pdf" staged/EduMIPS64-manual-en.pdf
          cp "release-artifacts/Italian manual (PDF)/EduMIPS64.pdf" staged/EduMIPS64-manual-it.pdf

          # MSI
          cp release-artifacts/MSI/EduMIPS64-*.msi staged/

          # Electron – zip each platform build
          for dir in "Electron Linux x64" "Electron macOS ARM64" "Electron Windows x64"; do
            platform_slug=$(echo "$dir" | tr '[:upper:] ' '[:lower:]-')
            (cd "release-artifacts/${dir}" && zip -r "../../staged/edumips64-${VERSION}-${platform_slug}.zip" .)
          done

          echo "Staged artifacts:"
          ls -lh staged/

      - name: Create tag and GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: EduMIPS64 v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: staged/*
