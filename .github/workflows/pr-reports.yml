name: PR preview deploy

# Privileged stage of the CI pipeline. It is triggered when the CI Build
# workflow completes and runs entirely from the base branch: it never checks
# out or executes pull request code. Its only inputs are the artifacts produced
# by CI Build, which are treated as inert data.
#
# Coverage statistics are published directly in the CI Build job summaries, so
# this workflow needs no pull-request write access. The only privileged action
# here is deploying a static preview build, which uses repository secrets but
# never runs pull request code.
on:
  workflow_run:
    workflows: ["CI Build"]
    types:
      - completed

permissions:
  contents: read

jobs:
  # Recover the pull request number from the artifact uploaded by CI Build and
  # validate it strictly, since it is untrusted input.
  metadata:
    name: Resolve pull request metadata
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pr: ${{ steps.read.outputs.pr }}
    steps:
      - name: Download PR number artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: pr-number
          path: pr
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read and validate PR number
        id: read
        run: |
          number="$(cat pr/pr-number.txt)"
          if [[ ! "$number" =~ ^[0-9]+$ ]]; then
            echo "::error::Unexpected pull request number: '$number'"
            exit 1
          fi
          echo "pr=$number" >> "$GITHUB_OUTPUT"

  # Deploy the pre-built web application to the staging environment and run a
  # lightweight reachability check against it. The artifact content is built
  # from PR code, but it is only ever uploaded as static files here; no PR code
  # is executed in this privileged job.
  deploy-staging:
    name: Deploy web application to staging environment
    needs: metadata
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      # Use the staging-dependabot environment for automated/maintainer PRs to
      # avoid approval requirements; use the approval-gated Staging environment
      # for everyone else (including forks).
      name: ${{ (contains(fromJSON('["dependabot[bot]", "renovate[bot]", "copilot[bot]", "dependabot", "renovate", "copilot", "lupino3"]'), github.event.workflow_run.triggering_actor.login)) && 'staging-dependabot' || 'Staging' }}
      url: https://edumips64ci.z16.web.core.windows.net/${{ needs.metadata.outputs.pr }}/
    steps:
      - name: Download web application artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: web
          path: out/web
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy files to run directory
        run: mkdir -p pr/${{ needs.metadata.outputs.pr }} && cp -r out/web/* pr/${{ needs.metadata.outputs.pr }}

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload to Azure blob storage (https://edumips64ci.z16.web.core.windows.net/${{ needs.metadata.outputs.pr }}/)
        uses: azure/CLI@v3
        with:
          inlineScript: |
              az storage blob upload-batch --account-name edumips64ci --auth-mode key -d '$web/${{ needs.metadata.outputs.pr }}' -s pr/${{ needs.metadata.outputs.pr }} --overwrite

      # Verify the deployed preview is reachable. This is a plain availability
      # check that does not execute any pull request code; the full functional
      # Playwright suite already runs against a local server in CI Build.
      - name: Verify deployed preview is reachable
        env:
          PREVIEW_URL: https://edumips64ci.z16.web.core.windows.net/${{ needs.metadata.outputs.pr }}/
        run: |
          for i in $(seq 1 20); do
            if curl -sSf "$PREVIEW_URL" -o /dev/null; then
              echo "Preview reachable at $PREVIEW_URL"
              exit 0
            fi
            echo "Attempt $i: not ready yet, retrying..."
            sleep 6
          done
          echo "::error::Preview deployment was not reachable at $PREVIEW_URL"
          exit 1
