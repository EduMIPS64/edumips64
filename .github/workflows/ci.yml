name: CI Build

# This is the "untrusted" stage of the CI pipeline. On pull requests (including
# those from forks) it runs with a read-only token and NO access to secrets: it
# builds and tests the proposed code, publishes coverage to the run's job
# summaries, and uploads the build outputs as artifacts.
#
# On pull requests the only privileged action (deploying a preview build) is
# handled by the separate `pr-reports.yml` workflow, which runs base-branch code
# only and never checks out pull request code. This separation means that code
# from a fork can be built and tested safely without ever being able to reach
# repository secrets or a write-enabled token.
#
# On `push` to `master` and on the nightly `schedule` (both of which can only run
# trusted, already-merged code — a fork cannot trigger them on this repo) one
# extra job runs: `publish-web-candidate`. It depends only on `build-web`, so the
# freshly built web app is published as a per-commit candidate to
# web.edumips.org as soon as the (fast) web build finishes, in parallel with the
# slow desktop/snap/electron builds. That job — and only that job — is granted
# the `PAT_WEBUI` secret (via the reusable `push-web.yml` workflow); it is gated
# to `master` push/schedule events so it never runs for pull requests or forks.
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'

# Read-only by default. No job in this workflow needs more.
permissions:
  contents: read

jobs:
  # Detect which files changed in the PR to conditionally run expensive builds.
  # On schedule and push-to-master runs, all outputs are set to 'true' so every
  # build runs (a merged master commit always gets the full pipeline).
  detect-changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      snap: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && 'true' || steps.changes.outputs.snap }}
      electron: ${{ (github.event_name == 'schedule' || github.event_name == 'push') && 'true' || steps.changes.outputs.electron }}
    steps:
      - uses: actions/checkout@v7
        if: github.event_name == 'pull_request'

      - name: Check changed paths
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            snap:
              - 'snapcraft.yaml'
              - 'scripts/**'
              - 'docs/requirements.txt'
              - 'gradle.properties'
            electron:
              - 'electron/**'
              - '.nvmrc'

  build-desktop:
    permissions:
      contents: read
    uses: ./.github/workflows/build-desktop.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}

  build-web:
    permissions:
      contents: read
    uses: ./.github/workflows/build-web.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}

  # Publish the freshly built web app as a per-commit candidate to
  # web.edumips.org. Runs ONLY on master push/schedule events (never on pull
  # requests or forks), and depends solely on `build-web` so the candidate goes
  # live as soon as the web build finishes — in parallel with the slow
  # desktop/snap/electron jobs. The privileged publish logic (and the PAT_WEBUI
  # secret) lives in the reusable `push-web.yml` workflow; it is reused here and
  # also runnable on its own via workflow_dispatch. See
  # docs/design/unified-web-versioning.md.
  publish-web-candidate:
    name: Publish web candidate
    needs: build-web
    if: >-
      github.ref == 'refs/heads/master' &&
      (github.event_name == 'push' || github.event_name == 'schedule')
    permissions:
      contents: read
      actions: read
    uses: ./.github/workflows/push-web.yml
    with:
      run_id: ${{ github.run_id }}
      head_sha: ${{ github.sha }}
    secrets: inherit

  # Run web UI Playwright tests locally with Istanbul coverage instrumentation.
  # Lint all Markdown files (markdownlint-cli2; rules in .markdownlint.json,
  # globs/ignores in .markdownlint-cli2.jsonc). A dedicated job so markdown
  # feedback lands fast, without waiting for the web build.
  lint-docs:
    name: Lint Markdown
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.JS
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Lint Markdown
        run: npm run lint:md

  # The coverage report is rendered as a Markdown table and published to this
  # run's job summary. No secrets are used here.
  test-web-coverage:
    name: Web UI coverage (Playwright)
    runs-on: ubuntu-latest
    needs: build-web
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node.JS
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm run test:unit

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Download the pre-built web application (includes the GWT worker.js).
      - name: Download web application artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: web
          path: out/web

      # Rebuild only the Vite UI bundle with Istanbul instrumentation.
      # worker.js was already compiled by the build-web job above.
      # COVERAGE=true activates vite-plugin-istanbul (requireEnv: true),
      # which injects window.__coverage__ collected by the Playwright fixtures.
      - name: Rebuild Vite UI bundle with coverage instrumentation
        run: COVERAGE=true npm run build-dbg

      # Serve the web application locally so tests can run against localhost.
      - name: Start local HTTP server
        run: python3 -m http.server 8080 --directory out/web &

      - name: Wait for local server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 && break || sleep 1
          done

      # Run the full Playwright suite with coverage collection enabled.
      - name: Run web tests with coverage
        env:
          COVERAGE: 'true'
          PLAYWRIGHT_TARGET_URL: 'http://localhost:8080'
        run: npx playwright test

      # Guard against production-only bundle breakage: the coverage run above
      # exercises a development build, which cannot catch failures that only
      # occur in the minified production bundle. Rebuild the UI the same way
      # deployed candidates are built and smoke-test it.
      - name: Build production UI bundle
        run: npm run build

      - name: Serve production bundle
        run: python3 -m http.server 8081 --directory out/web &

      - name: Wait for production server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8081 && break || sleep 1
          done

      - name: Smoke-test production bundle
        env:
          PLAYWRIGHT_TARGET_URL: 'http://localhost:8081'
        run: npx playwright test basic-tests

      # Upload Playwright traces, screenshots, and HTML report whenever the
      # test step fails so the failure is diagnosable without rerunning.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      # Merge per-test coverage JSON files and produce an lcov report.
      # Run regardless of test outcome: even with some failing tests we want
      # to publish whatever coverage was collected.
      - name: Generate lcov coverage report
        if: always()
        run: |
          mkdir -p coverage
          npx nyc report --reporter=lcov > /dev/null || true

      # Render the lcov report as a Markdown table (matching the Java coverage
      # summary style) and publish it to the run's job summary.
      - name: Summarise web coverage
        if: always() && hashFiles('coverage/lcov.info') != ''
        run: python utils/lcov-summary.py coverage/lcov.info coverage/web-coverage.md

      # Append the Markdown summary to the GitHub Actions run summary.
      - name: Publish coverage summary to job summary
        if: always() && hashFiles('coverage/web-coverage.md') != ''
        run: cat coverage/web-coverage.md >> "$GITHUB_STEP_SUMMARY"

  # Run the pytest suite that guards the Python deploy-web-pages script.
  # No paths-filter gate: the suite is fast and must always be green.
  test-deploy-script:
    name: Deploy script tests (pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install pytest
        run: pip install pytest

      # The test file loads deploy-web-pages.py via importlib relative to the
      # scripts directory, so the working-directory must be .github/scripts.
      - name: Run deploy-script tests
        working-directory: .github/scripts
        run: python -m pytest test_deploy_web_pages.py -q

  # Persist the pull request number as an artifact so the privileged workflow
  # (which is triggered by workflow_run and therefore has no PR context) knows
  # which pull request to deploy a preview for.
  save-pr-metadata:
    name: Save pull request metadata
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Write PR number
        run: |
          mkdir -p pr
          echo "${{ github.event.pull_request.number }}" > pr/pr-number.txt
      - uses: actions/upload-artifact@v7
        with:
          name: pr-number
          path: pr/pr-number.txt

  # Build and test Snapcraft package when relevant files change.
  build-and-test-snap:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.snap == 'true' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'renovate[bot]'
    permissions:
      contents: read
    uses: ./.github/workflows/build-snap.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}

  # Build Electron applications when relevant files change.
  build-electron:
    needs: [detect-changes, build-web]
    if: needs.detect-changes.outputs.electron == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/build-electron.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
