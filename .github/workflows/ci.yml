name: CI

on:
  pull_request_target:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'


jobs:
  # Detect which files changed in the PR to conditionally run expensive builds.
  # On schedule runs, all outputs are set to 'true' so every build runs.
  detect-changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      snap: ${{ github.event_name == 'schedule' && 'true' || steps.changes.outputs.snap }}
      electron: ${{ github.event_name == 'schedule' && 'true' || steps.changes.outputs.electron }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request_target'
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check changed paths
        if: github.event_name == 'pull_request_target'
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            snap:
              - 'snapcraft.yaml'
              - 'scripts/**'
              - 'docs/requirements.txt'
              - 'gradle.properties'
            electron:
              - 'electron/**'
              - '.nvmrc'

  build-desktop:
    permissions:
      contents: read
    uses: ./.github/workflows/build-desktop.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
      upload_codecov: true
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  build-web:
    permissions:
      contents: read
    uses: ./.github/workflows/build-web.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}

  # Collect web UI code coverage by rebuilding the React bundle with Istanbul
  # instrumentation, running Playwright tests against a local server, and
  # uploading the lcov report to Codecov.
  web-coverage:
    name: Web UI code coverage
    runs-on: ubuntu-latest
    needs: build-web
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.JS
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install

      # Download the pre-built web artifact (contains the GWT worker and static
      # assets).  We only need to overwrite ui.js with an instrumented build.
      - name: Download web application artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: web
          path: out/web

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Rebuild web UI with Istanbul instrumentation
        run: npm run build:coverage

      - name: Run Playwright tests with coverage collection
        run: npm run test:coverage

      - name: Generate lcov coverage report
        run: npm run report:coverage

      - name: Upload web UI coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: webui
          files: out/coverage/lcov.info

  deploy-staging:
    name: Deploy web application to staging environment
    permissions: write-all
    runs-on: ubuntu-latest
    needs: build-web
    if: ${{ github.event_name == 'pull_request_target' }}
    environment:
      # Use staging-dependabot environment for dependabot, renovate, copilot, and lupino3 PRs to avoid approval requirements
      # Use Staging environment for regular PRs
      name: ${{ (github.event.pull_request.user.login == 'dependabot[bot]' || github.event.pull_request.user.login == 'renovate[bot]' || github.event.pull_request.user.login == 'copilot[bot]' || github.event.pull_request.user.login == 'dependabot' || github.event.pull_request.user.login == 'renovate' || github.event.pull_request.user.login == 'copilot' || github.event.pull_request.user.login == 'lupino3') && 'staging-dependabot' || 'Staging' }}
      url: https://edumips64ci.z16.web.core.windows.net/${{github.event.pull_request.number}}/
    steps:
      # Download web application built in 'build-web'
      - uses: actions/download-artifact@v8.0.1
        name: Download web application artifacts
        with:
          name: web
          path: out/web

      # Deploy the code on Github Pages.
      # Copy files to a directory to allow pushing to a subdir in the web.edumips.org repo.
      - name: Copy files to run directory
        run: mkdir -p pr/${{ github.event.pull_request.number }} && cp -r out/web/* pr/${{ github.event.pull_request.number }}
        
      # Upload to Azure blob if this is a PR.
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
      - name: Upload to Azure blob storage (https://edumips64ci.z16.web.core.windows.net/${{github.event.pull_request.number}}/)
        uses: azure/CLI@v3
        with:
          inlineScript: |
              az storage blob upload-batch --account-name edumips64ci --auth-mode key -d '$web/${{ github.event.pull_request.number }}' -s pr/${{ github.event.pull_request.number }} --overwrite

  # Test the deployed web application.
  # This is only ran on pull request because runs triggered by push and schedule
  # will deploy to web.edumips.org. Given that the deployment has some latency,
  # the test will most likely run against the previously-deployed version,
  # potentially giving a false sense of security if a developer sees the test being
  # run immediately after the deployment.
  #
  # There is a separate job that periodically monitors web.edumips.org, which will
  # catch regressions.
  test-web:
    name: Test web application
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: ${{ github.event_name == 'pull_request_target' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: git log -1
      - name: Set up Node.JS
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install JS dependencies
        run: npm install
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install
      # Run tests against the deployed code.
      - name: Run web tests against deployed code
        uses: nick-fields/retry@v4
        env:
          PLAYWRIGHT_TARGET_URL: https://edumips64ci.z16.web.core.windows.net/${{github.event.pull_request.number}}/
        with:
          max_attempts: 10
          timeout_minutes: 2
          retry_on: error
          command: npm run test

  # Build and test Snapcraft package when relevant files change.
  build-and-test-snap:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.snap == 'true' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'renovate[bot]'
    permissions:
      contents: read
    uses: ./.github/workflows/build-snap.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}

  # Build Electron applications when relevant files change.
  build-electron:
    needs: [detect-changes, build-web]
    if: needs.detect-changes.outputs.electron == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/build-electron.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
