name: CI Build

# This is the "untrusted" stage of the CI pipeline. It runs on pull requests
# (including those from forks) with a read-only token and NO access to secrets.
# It builds and tests the proposed code, publishes coverage to the run's job
# summaries, and uploads the build outputs as artifacts.
#
# The only privileged action (deploying a preview build) is handled by the
# separate `pr-reports.yml` workflow, which runs base-branch code only and
# never checks out pull request code. This separation means that code from a
# fork can be built and tested safely without ever being able to reach
# repository secrets or a write-enabled token.
on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Read-only by default. No job in this workflow needs more.
permissions:
  contents: read

jobs:
  # Detect which files changed in the PR to conditionally run expensive builds.
  # On schedule and manual (workflow_dispatch) runs, all outputs are set to 'true' so every build runs.
  detect-changes:
    name: Detect file changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      snap: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'true' || steps.changes.outputs.snap }}
      electron: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'true' || steps.changes.outputs.electron }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request'

      - name: Check changed paths
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            snap:
              - 'snapcraft.yaml'
              - 'scripts/**'
              - 'docs/requirements.txt'
              - 'gradle.properties'
            electron:
              - 'electron/**'
              - '.nvmrc'

  build-desktop:
    permissions:
      contents: read
    uses: ./.github/workflows/build-desktop.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}

  build-web:
    permissions:
      contents: read
    uses: ./.github/workflows/build-web.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}

  # Run web UI Playwright tests locally with Istanbul coverage instrumentation.
  # The coverage report is rendered as a Markdown table and published to this
  # run's job summary. No secrets are used here.
  test-web-coverage:
    name: Web UI coverage (Playwright)
    runs-on: ubuntu-latest
    needs: build-web
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node.JS
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Download the pre-built web application (includes the GWT worker.js).
      - name: Download web application artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: web
          path: out/web

      # Rebuild only the webpack UI bundle with Istanbul instrumentation.
      # worker.js was already compiled by the build-web job above.
      - name: Rebuild webpack UI bundle with coverage instrumentation
        run: BABEL_ENV=coverage npx webpack

      # Serve the web application locally so tests can run against localhost.
      - name: Start local HTTP server
        run: python3 -m http.server 8080 --directory out/web &

      - name: Wait for local server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080 && break || sleep 1
          done

      # Run the full Playwright suite with coverage collection enabled.
      - name: Run web tests with coverage
        env:
          COVERAGE: 'true'
          PLAYWRIGHT_TARGET_URL: 'http://localhost:8080'
        run: npx playwright test

      # Upload Playwright traces, screenshots, and HTML report whenever the
      # test step fails so the failure is diagnosable without rerunning.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces-${{ github.run_id }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      # Merge per-test coverage JSON files and produce an lcov report.
      # Run regardless of test outcome: even with some failing tests we want
      # to publish whatever coverage was collected.
      - name: Generate lcov coverage report
        if: always()
        run: |
          mkdir -p coverage
          npx nyc report --reporter=lcov > /dev/null || true

      # Render the lcov report as a Markdown table (matching the Java coverage
      # summary style) and publish it to the run's job summary.
      - name: Summarise web coverage
        if: always() && hashFiles('coverage/lcov.info') != ''
        run: python utils/lcov-summary.py coverage/lcov.info coverage/web-coverage.md

      # Append the Markdown summary to the GitHub Actions run summary.
      - name: Publish coverage summary to job summary
        if: always() && hashFiles('coverage/web-coverage.md') != ''
        run: cat coverage/web-coverage.md >> "$GITHUB_STEP_SUMMARY"

  # Persist the pull request number as an artifact so the privileged workflow
  # (which is triggered by workflow_run and therefore has no PR context) knows
  # which pull request to deploy a preview for.
  save-pr-metadata:
    name: Save pull request metadata
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Write PR number
        run: |
          mkdir -p pr
          echo "${{ github.event.pull_request.number }}" > pr/pr-number.txt
      - uses: actions/upload-artifact@v7
        with:
          name: pr-number
          path: pr/pr-number.txt

  # Build and test Snapcraft package when relevant files change.
  build-and-test-snap:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.snap == 'true' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.user.login != 'renovate[bot]'
    permissions:
      contents: read
    uses: ./.github/workflows/build-snap.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}

  # Build Electron applications when relevant files change.
  build-electron:
    needs: [detect-changes, build-web]
    if: needs.detect-changes.outputs.electron == 'true'
    permissions:
      contents: read
    uses: ./.github/workflows/build-electron.yml
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
