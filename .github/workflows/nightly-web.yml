name: Nightly Web Deploy

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC daily
  workflow_dispatch:       # manual trigger for testing

# Serialise all Pages writes; never cancel an in-flight nightly deploy.
concurrency:
  group: web-pages-deploy
  cancel-in-progress: false

jobs:
  deploy-nightly:
    name: Deploy nightly web to /nightly/
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout edumips64 (for script)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Find latest successful CI run on master
        id: find_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RUN_JSON=$(gh run list \
            --workflow ci.yml \
            --branch master \
            --status success \
            --limit 1 \
            --json databaseId,headSha \
            --jq '.[0]' \
            --repo "${{ github.repository }}")

          if [[ -z "$RUN_JSON" || "$RUN_JSON" == "null" ]]; then
            echo "ERROR: No successful CI run found on master"
            exit 1
          fi

          RUN_ID=$(echo "$RUN_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['databaseId'])")
          HEAD_SHA=$(echo "$RUN_JSON" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['headSha'])")

          echo "Found run ${RUN_ID} @ ${HEAD_SHA}"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download web artifact from latest master CI run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ steps.find_run.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p artifact/web
          gh run download "${RUN_ID}" --name web --dir artifact/web \
            --repo "${{ github.repository }}"
          echo "Artifact contents:"
          ls artifact/web/

      - name: Clone Pages repo
        env:
          PAT_WEBUI: ${{ secrets.PAT_WEBUI }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${PAT_WEBUI}@github.com/EduMIPS64/web.edumips.org.git" \
            pages-repo --branch master --depth 1
          git -C pages-repo config user.name "github-actions[bot]"
          git -C pages-repo config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run nightly deploy script
        run: |
          set -euo pipefail
          cp .github/scripts/deploy-web-pages.sh pages-repo/
          cd pages-repo
          bash deploy-web-pages.sh nightly "../artifact/web"
          rm -f deploy-web-pages.sh

      - name: Commit and push to Pages repo
        env:
          HEAD_SHA: ${{ steps.find_run.outputs.head_sha }}
        run: |
          set -euo pipefail
          cd pages-repo
          git add -A
          git diff --cached --quiet && { echo "Nothing to commit."; exit 0; }
          git commit -m "Nightly web @ ${HEAD_SHA}"
          git push origin master
          echo "Nightly deploy complete @ ${HEAD_SHA}"
