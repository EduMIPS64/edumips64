name: Nightly Web Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# Serialise all Pages writes; never cancel an in-flight nightly deploy.
concurrency:
  group: web-pages-deploy
  cancel-in-progress: false

jobs:
  deploy-nightly:
    name: Deploy nightly web to /nightly/
    # Only run when CI completed successfully on a master push.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout edumips64 (for script)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download web artifact from triggering run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIGGERING_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p artifact/web
          gh run download "${TRIGGERING_RUN_ID}" --name web --dir artifact/web \
            --repo "${{ github.repository }}"
          echo "Artifact contents:"
          ls artifact/web/

      - name: Clone Pages repo
        env:
          PAT_WEBUI: ${{ secrets.PAT_WEBUI }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${PAT_WEBUI}@github.com/EduMIPS64/web.edumips.org.git" \
            pages-repo --branch master --depth 1
          git -C pages-repo config user.name "github-actions[bot]"
          git -C pages-repo config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run nightly deploy script
        run: |
          set -euo pipefail
          cp .github/scripts/deploy-web-pages.sh pages-repo/
          cd pages-repo
          bash deploy-web-pages.sh nightly "../artifact/web"
          rm -f deploy-web-pages.sh

      - name: Commit and push to Pages repo
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          cd pages-repo
          git add -A
          git diff --cached --quiet && { echo "Nothing to commit."; exit 0; }
          git commit -m "Nightly web @ ${HEAD_SHA}"
          git push origin master
          echo "Nightly deploy complete @ ${HEAD_SHA}"
