# Promote Web to Production
#
# Promotion is a pure metadata + file-copy operation against a build that was
# ALREADY built and pushed to /c/<sha>/ by push-web.yml. It NEVER builds a new
# web artifact (see docs/design/unified-web-versioning.md).
#
# Input:
#   sha — full or short commit SHA of the candidate to promote. Leave empty to
#         promote the NEWEST candidate currently in versions.json.
#
# Security model:
#   - Gated on `github.actor == 'lupino3'` AND `github.ref_name == 'master'`.
#     The master-only gate ensures the workflow file itself is the audited
#     version; a tampered copy on a feature branch can never reach PAT_WEBUI.
#   - The `concurrency` lock (web-pages-deploy) serialises all Pages writes.

name: Promote Web to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA (full or short) of the pushed candidate to promote. Leave empty to promote the newest candidate.'
        required: false
        type: string

concurrency:
  group: web-pages-deploy
  cancel-in-progress: false

jobs:
  promote:
    name: Promote a pushed candidate to production
    if: github.actor == 'lupino3' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout edumips64 (for script)
        uses: actions/checkout@v7
        with:
          # Full history so the one-shot legacy migration can compute
          # seq = `git rev-list --count <sha>` for past promoted builds.
          fetch-depth: 0

      - name: Clone Pages repo
        env:
          PAT_WEBUI: ${{ secrets.PAT_WEBUI }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${PAT_WEBUI}@github.com/EduMIPS64/web.edumips.org.git" \
            pages-repo --branch master --depth 1
          git -C pages-repo config user.name "github-actions[bot]"
          git -C pages-repo config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Migrate legacy Pages layout if needed
        run: .github/scripts/migrate-pages-if-needed.sh pages-repo "${{ github.workspace }}"

      - name: Resolve SHA to promote
        id: resolve
        env:
          INPUT_SHA: ${{ inputs.sha }}
        run: |
          set -euo pipefail
          cd pages-repo
          if [[ -n "${INPUT_SHA}" ]]; then
            SHA="${INPUT_SHA}"
          else
            # Default: newest candidate (highest seq that is not promoted).
            SHA=$(python3 <<'PY'
          import json
          d = json.load(open('versions.json'))
          cands = [v for v in d['versions'] if not v['promoted']]
          if not cands:
              raise SystemExit('ERROR: no pending candidates to promote')
          print(max(cands, key=lambda v: v['seq'])['sha'])
          PY
          )
          fi
          echo "Promoting SHA: ${SHA}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      # ---- Promotion gate ----------------------------------------------
      # Never promote a candidate that does not actually work. The candidate
      # is already published at https://web.edumips.org/c/<sha>/, so run the
      # basic Playwright tests against that exact, publicly-served content
      # before touching production. This is the last line of defense against
      # shipping a broken bundle (e.g. the Babel 8 jsxDEV regression that
      # blanked the page at startup): even if a broken build slips through
      # CI and gets pushed as a candidate, promotion aborts here.
      - name: Set up Node.JS
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install JS dependencies (for the candidate smoke test)
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Smoke-test the candidate before promotion
        env:
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          FULL_SHA=$(cd pages-repo && python3 <<'PY'
          import json, os, sys
          short = os.environ['SHA']
          d = json.load(open('versions.json'))
          m = [v for v in d['versions'] if v['sha'].startswith(short)]
          if len(m) != 1:
              sys.exit('ERROR: %d versions in versions.json match %s' % (len(m), short))
          print(m[0]['sha'])
          PY
          )
          echo "Smoke-testing candidate at https://web.edumips.org/c/${FULL_SHA}/"
          PLAYWRIGHT_TARGET_URL="https://web.edumips.org/c/${FULL_SHA}" \
            npx playwright test basic-tests
      # --------------------------------------------------------------------

      - name: Run promote script (never builds)
        env:
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          cp .github/scripts/deploy-web-pages.py pages-repo/
          cd pages-repo
          python3 deploy-web-pages.py promote "${SHA}" "${{ github.actor }}"
          rm -f deploy-web-pages.py

      - name: Commit and push to Pages repo
        id: push
        env:
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          cd pages-repo
          # Read the resolved current SHA and its build string for the message.
          BUILD=$(python3 -c "import json; d=json.load(open('versions.json')); cur=d['current']; e=[v for v in d['versions'] if v['sha']==cur][0]; print(e['build'])")
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "build=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Promote web to ${SHA:0:8} (${BUILD})"
          git push origin master
          echo "Promoted ${SHA} (${BUILD}) to web.edumips.org"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"

      # Explicitly trigger the Pages deploy workflow rather than relying on the
      # push event alone: on 2026-07-03 GitHub dropped the push webhook for a
      # promote commit and no deploy run was ever created. The dispatch is
      # idempotent alongside the push trigger (concurrency group 'pages' in
      # the deploy workflow serialises; a duplicate run deploys the same
      # commit). Requires PAT_WEBUI to have Actions write scope; a 403 here
      # is loud and actionable rather than a silent 10-minute verify timeout.
      - name: Trigger Pages deploy
        if: steps.push.outputs.pushed == 'true'
        env:
          PAT_WEBUI: ${{ secrets.PAT_WEBUI }}
        run: |
          set -euo pipefail
          HTTP=$(curl -sS -o /tmp/dispatch-resp.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${PAT_WEBUI}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d '{"ref":"master"}' \
            "https://api.github.com/repos/EduMIPS64/web.edumips.org/actions/workflows/deploy-pages.yml/dispatches")
          if [[ "${HTTP}" != "204" ]]; then
            echo "::warning::Deploy dispatch returned HTTP ${HTTP}: $(head -c 200 /tmp/dispatch-resp.json 2>/dev/null)."
            echo "::warning::If 403, grant PAT_WEBUI the Actions write scope (classic: 'workflow'; fine-grained: Actions R/W). Relying on the push trigger for this run."
          else
            echo "Deploy workflow dispatched."
          fi

      - name: Verify Pages deployment
        if: steps.push.outputs.pushed == 'true'
        env:
          PAT_WEBUI: ${{ secrets.PAT_WEBUI }}
          EXPECTED_BUILD: ${{ steps.push.outputs.build }}
        run: |
          set -euo pipefail
          .github/scripts/verify-pages-deploy.sh "${EXPECTED_BUILD}" pages-repo
