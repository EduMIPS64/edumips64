name: Rollback Web Production

# Reverts production to the newest PROMOTED version older than the current one
# (see docs/design/unified-web-versioning.md). The build is copied from its
# existing /c/<sha>/ snapshot — no rebuild. Pending candidates are preserved.

on:
  workflow_dispatch:

# Serialise all Pages writes; never cancel an in-flight rollback.
concurrency:
  group: web-pages-deploy
  cancel-in-progress: false

jobs:
  rollback:
    name: Roll back web production to last known good
    # Only the maintainer (lupino3) may trigger this.
    if: github.actor == 'lupino3'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout edumips64 (for script)
        uses: actions/checkout@v6
        with:
          # Full history so the one-shot legacy migration can compute
          # seq = `git rev-list --count <sha>` for past promoted builds.
          fetch-depth: 0

      - name: Clone Pages repo
        env:
          PAT_WEBUI: ${{ secrets.PAT_WEBUI }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${PAT_WEBUI}@github.com/EduMIPS64/web.edumips.org.git" \
            pages-repo --branch master --depth 1
          git -C pages-repo config user.name "github-actions[bot]"
          git -C pages-repo config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Migrate legacy Pages layout if needed
        run: .github/scripts/migrate-pages-if-needed.sh pages-repo "${{ github.workspace }}"

      - name: Run rollback script
        run: |
          set -euo pipefail
          cp .github/scripts/deploy-web-pages.py pages-repo/
          cd pages-repo
          python3 deploy-web-pages.py rollback "${{ github.actor }}"
          rm -f deploy-web-pages.py

      - name: Commit and push to Pages repo
        run: |
          set -euo pipefail
          cd pages-repo
          git add -A
          git diff --cached --quiet && { echo "Nothing to commit."; exit 0; }
          git commit -m "Rollback web to last known good (triggered by ${{ github.actor }})"
          git push origin master
          echo "Rollback complete."
