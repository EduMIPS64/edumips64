name: Build Desktop Application

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: true
        type: string

jobs:
  build:
    name: Build desktop application and docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Set up Python 3.12
        id: setup-python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Configure Python path for Gradle
        run: |
          PYTHON_DIR=$(dirname "${{ steps.setup-python.outputs.python-path }}")
          echo "ORG_GRADLE_PROJECT_pythonPath=$PYTHON_DIR" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check that every instruction is covered by a test
        run: sh utils/find-instructions.sh

      - name: Install Xvfb for Swing tests
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Compile and run tests
        run: ./gradlew check

      # Summarise the JaCoCo report (produced by `./gradlew check`) into a
      # small Markdown table and publish it to the run's job summary.
      - name: Publish Java coverage to job summary
        if: hashFiles('build/reports/jacoco/test/jacocoTestReport.xml') != ''
        run: |
          python utils/jacoco-summary.py build/reports/jacoco/test/jacocoTestReport.xml java-coverage.md
          cat java-coverage.md >> "$GITHUB_STEP_SUMMARY"

      - name: Build all docs
        run: ./gradlew allDocs

      - name: Build JAR
        run: ./gradlew jar

      - name: Get produced JAR path
        id: get_jar
        run: |
          JAR_FILE=$(ls ./out/edumips64-*.jar | grep -v '\-nohelp\.jar' | head -1)
          echo "path=${JAR_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: JAR
          path: ${{ steps.get_jar.outputs.path }}

      - name: Upload English Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: English manual (PDF)
          path: ./out/docs/en/pdf/EduMIPS64.pdf

      - name: Upload Italian Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: Italian manual (PDF)
          path: ./out/docs/it/pdf/EduMIPS64.pdf

      - name: Upload Chinese Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: Chinese manual (PDF)
          path: ./out/docs/zh/pdf/EduMIPS64.pdf
