name: Build Desktop Application

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: true
        type: string
      upload_codecov:
        description: 'Upload code coverage to Codecov'
        required: false
        type: boolean
        default: false
    secrets:
      codecov_token:
        required: false

jobs:
  build:
    name: Build desktop application and docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read version from gradle.properties
        id: read_version
        uses: christian-draeger/read-properties@1.1.1
        with:
          path: 'gradle.properties'
          properties: 'version'

      - name: Compile and run tests
        run: ./gradlew check

      - name: Upload code coverage
        if: inputs.upload_codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.codecov_token }}

      - name: Build all docs
        run: ./gradlew allDocs

      - name: Build JAR
        run: ./gradlew jar

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: JAR
          path: ./build/libs/edumips64-${{ steps.read_version.outputs.version }}.jar

      - name: Upload English Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: English manual (PDF)
          path: ./build/docs/en/pdf/EduMIPS64.pdf

      - name: Upload Italian Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: Italian manual (PDF)
          path: ./build/docs/it/pdf/EduMIPS64.pdf
