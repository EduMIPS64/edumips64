name: Build Desktop Application

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: true
        type: string

jobs:
  build:
    name: Build desktop application and docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so the JaCoCo coverage step below can post / update a sticky
      # comment on the originating pull request when the workflow is invoked
      # from a pull_request_target event.
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'microsoft'
          cache: 'gradle'

      - name: Set up Python 3.12
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Configure Python path for Gradle
        run: |
          PYTHON_DIR=$(dirname "${{ steps.setup-python.outputs.python-path }}")
          echo "ORG_GRADLE_PROJECT_pythonPath=$PYTHON_DIR" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check that every instruction is covered by a test
        run: sh utils/find-instructions.sh

      - name: Read version from gradle.properties
        id: read_version
        uses: christian-draeger/read-properties@1.1.1
        with:
          path: 'gradle.properties'
          properties: 'version'

      - name: Compile and run tests
        run: ./gradlew check

      # Publish the JaCoCo report directly to the pull request and to the
      # Actions run summary, with no third-party service involved. The XML
      # report is produced by `./gradlew check` (jacocoTestReport runs as part
      # of `check`). Gated on pull_request_target because release.yml also
      # calls this reusable workflow and there is no PR to comment on there.
      - name: Report Java coverage on PR
        if: github.event_name == 'pull_request_target' && hashFiles('build/reports/jacoco/test/jacocoTestReport.xml') != ''
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Java code coverage
          update-comment: true
          # The Swing UI is excluded from coverage (see developer-guide.md);
          # keep the thresholds informational rather than gating.
          min-coverage-overall: 0
          min-coverage-changed-files: 0

      - name: Build all docs
        run: ./gradlew allDocs

      - name: Build JAR
        run: ./gradlew jar

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: JAR
          path: ./out/edumips64-${{ steps.read_version.outputs.version }}.jar

      - name: Upload English Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: English manual (PDF)
          path: ./out/docs/en/pdf/EduMIPS64.pdf

      - name: Upload Italian Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: Italian manual (PDF)
          path: ./out/docs/it/pdf/EduMIPS64.pdf

      - name: Upload Chinese Manual PDF
        uses: actions/upload-artifact@v7
        with:
          name: Chinese manual (PDF)
          path: ./out/docs/zh/pdf/EduMIPS64.pdf

